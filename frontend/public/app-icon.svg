<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#094771"/>
    </linearGradient>
  </defs>
  <!-- full-bleed фон (безопасно для maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- терминальный глиф >_ в центральной safe-зоне (~70%) -->
  <g fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="170,180 250,256 170,332"/>
    <line x1="270" y1="340" x2="350" y2="340"/>
  </g>
</svg>
